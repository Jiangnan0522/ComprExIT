# Compression Training Configuration Template
# This file provides examples for different compression configurations

# ===================================================================
# Basic Training Configuration
# ===================================================================
model_name_or_path: meta-llama/Llama-2-7b-hf  # Base model to use
dataset_name: trl-lib/Capybara  # Dataset for training
output_dir: ./outputs/llama-2-7b-compressed  # Where to save the model

# ===================================================================
# Training Hyperparameters
# ===================================================================
learning_rate: 2.0e-5
num_train_epochs: 1
per_device_train_batch_size: 2
gradient_accumulation_steps: 8
gradient_checkpointing: true
packing: true

# Evaluation
eval_strategy: steps
eval_steps: 100

# ===================================================================
# Compression Configuration
# ===================================================================
use_compression: true
compression_stride: 4  # Compression factor (4 = 4x sequence length reduction)
compression_layer_index: 16  # Layer at which to apply compression (0-indexed)
compression_use_gqa: true  # Use Grouped Query Attention in compression layer
compression_layer_position: 2  # Position in the model architecture

# ===================================================================
# Optional: LoRA Configuration (for memory-efficient training)
# ===================================================================
use_peft: false  # Set to true to enable LoRA
lora_r: 32  # LoRA rank
lora_alpha: 16  # LoRA alpha scaling
lora_dropout: 0.05
lora_target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]

# ===================================================================
# Advanced Settings
# ===================================================================
max_seq_length: 2048
bf16: true  # Use bfloat16 for training (requires Ampere+ GPUs)
# fp16: true  # Alternative: use float16 (use either bf16 or fp16, not both)

# Logging
logging_steps: 10
report_to: tensorboard  # Options: wandb, tensorboard, none

# Hub settings
push_to_hub: false
# hub_model_id: your-username/model-name  # Uncomment to push to hub


